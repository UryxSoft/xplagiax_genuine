# Load balancer for the multi-node topology (docs/SCALING.md).
#
# Docker's embedded DNS (127.0.0.11) returns every replica of the "app"
# service; resolving per-request (variable + resolver, valid=5s) makes
# nginx round-robin across replicas and pick up scale changes without a
# reload -- a static upstream block would pin the IPs resolved at startup.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=5s ipv6=off;

    # /search bodies and /index payloads are full documents
    client_max_body_size 50m;

    server {
        listen 80;

        location / {
            set $backend http://app:8000;
            proxy_pass $backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Request-Id $request_id;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }
    }
}
